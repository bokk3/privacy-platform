worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # Basic request rate limiting at the edge (defense in depth; app also limits)
  limit_req_zone $binary_remote_addr zone=edge_limit:10m rate=20r/s;

  upstream privacy_api {
    server server:4000;
  }

  upstream privacy_client {
    server client:5173;
  }

  server {
    listen 80;
    server_name _;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API routes — no trailing slash on proxy_pass so the /api/ prefix is
    # preserved when forwarded to Express (which mounts on /api/v1).
    location /api/ {
      limit_req zone=edge_limit burst=40 nodelay;
      proxy_pass http://privacy_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health probes — bypasses rate limiting so orchestrators can poll freely.
    location /health/ {
      proxy_pass http://privacy_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://privacy_client/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
    }
  }
}
