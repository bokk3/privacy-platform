services:
  postgres:
    image: postgres:16-alpine
    container_name: privacy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [privacy_net]

  redis:
    image: redis:7-alpine
    container_name: privacy_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [privacy_net]

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: privacy_server
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app/server
      - ./packages:/app/packages
      - server_node_modules:/app/server/node_modules
    command: ["npm", "run", "dev"]
    networks: [privacy_net]

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: privacy_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./packages:/app/packages
      - server_node_modules:/app/server/node_modules
    command: ["npm", "run", "worker"]
    networks: [privacy_net]

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: ${BUILD_TARGET:-development}
    container_name: privacy_client
    restart: unless-stopped
    env_file: .env
    depends_on:
      - server
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app/client
      - client_node_modules:/app/client/node_modules
    command: ["npm", "run", "dev", "--", "--host"]
    networks: [privacy_net]

  nginx:
    image: nginx:1.27-alpine
    container_name: privacy_nginx
    restart: unless-stopped
    depends_on:
      - server
      - client
    ports:
      - "8080:80"
    volumes:
      - ./scripts/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [privacy_net]

networks:
  privacy_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  server_node_modules:
  client_node_modules:
