openapi: 3.0.3
info:
  title: Opaca Engine API
  description: Public REST API for interacting with the Opaca Engine request pipeline.
  version: 1.0.0
servers:
  - url: http://localhost:4000/api/v1
    description: Development Server
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User created
  /auth/login:
    post:
      summary: Authenticate a user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Standard login response mapping JWT payload.
  /auth/login/mfa:
    post:
      summary: Authenticate via MFA
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - challengeToken
                - totpCode
              properties:
                challengeToken:
                  type: string
                totpCode:
                  type: string
      responses:
        '200':
          description: Standard login response generating final JWTs.
  /auth/me:
    get:
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      tags:
        - Authentication
      responses:
        '200':
          description: User profile payload.
  /auth/refresh:
    post:
      summary: Refresh JWT session
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New access and refresh tokens.
  /auth/logout:
    post:
      summary: Revoke session token
      security:
        - bearerAuth: []
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out successfully.
  /admin/health:
    get:
      summary: Basic system diagnostics
      security:
        - bearerAuth: []
      tags:
        - Admin
      responses:
        '200':
          description: Payload containing queue metrics and active objects.
  /admin/users:
    get:
      summary: List all users
      security:
        - bearerAuth: []
      tags:
        - Admin
      responses:
        '200':
          description: Paginated user index.
  /admin/brokers:
    get:
      summary: List all brokers
      security:
        - bearerAuth: []
      tags:
        - Admin
      responses:
        '200':
          description: All brokers.
    post:
      summary: Create data broker record
      security:
        - bearerAuth: []
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Broker created successfully.
  /requests:
    get:
      summary: List privacy requests
      security:
        - bearerAuth: []
      tags:
        - Requests
      responses:
        '200':
          description: A paginated list of privacy requests.
    post:
      summary: Create a new privacy request directly.
      security:
        - bearerAuth: []
      tags:
        - Requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - brokerId
                - identityOverrides
              properties:
                brokerId:
                  type: string
                identityOverrides:
                  type: object
      responses:
        '201':
          description: Request pipeline created.
                 
  /requests/{id}/timeline:
    get:
      summary: Get timeline audit for a specific request.
      security:
        - bearerAuth: []
      tags:
        - Requests
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Historical event status timeline.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
